<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-en="Privacy Policy · Orchestrana™" data-zh="隐私政策 · Orchestrana™">Privacy Policy · Orchestrana™</title>
  <meta name="description" content="Orchestrana privacy policy." />
  <link rel="icon" type="image/png" href="screenshots/Orchestrana%20icon%201.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />

  <style>
    .privacy-shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 40px 20px 72px;
    }
    .privacy-card {
      border: 1px solid var(--border);
      border-radius: 22px;
      background: linear-gradient(155deg, rgba(255,243,233,0.92), rgba(255,240,229,0.84));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.62), 0 14px 26px rgba(114,76,58,0.1);
      padding: clamp(22px, 4vw, 36px);
      max-width: 860px;
      margin: 0 auto;
      text-align: left;
      backdrop-filter: blur(14px);
    }
    .privacy-header {
      max-width: 860px;
      margin: 0 auto 18px;
      text-align: center;
    }
    .privacy-header .eyebrow { margin: 0; }
    .privacy-header h1 {
      margin: 10px 0 0;
      font-size: clamp(26px, 4vw, 36px);
      letter-spacing: -0.02em;
    }
    .privacy-header .muted {
      margin: 10px auto 0;
      max-width: 720px;
    }
    .legal-nav {
      margin: 18px auto 0;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .topbar .logo-link {
      color: var(--text);
      text-decoration: none;
    }

    .privacy-markdown {
      color: var(--muted);
      font-size: 16.5px;
      line-height: 1.75;
    }
    .privacy-markdown > :first-child { margin-top: 0; }
    .privacy-markdown h1,
    .privacy-markdown h2,
    .privacy-markdown h3,
    .privacy-markdown h4 {
      color: var(--text);
      margin: 22px 0 10px;
      line-height: 1.25;
    }
    .privacy-markdown h1 { font-size: 28px; }
    .privacy-markdown h2 { font-size: 22px; }
    .privacy-markdown h3 { font-size: 18px; }
    .privacy-markdown p { margin: 0 0 12px; color: var(--muted); }
    .privacy-markdown ul,
    .privacy-markdown ol {
      margin: 10px 0 16px;
      padding-left: 1.25em;
      display: grid;
      gap: 6px;
    }
    .privacy-markdown li { margin: 0; }
    .privacy-markdown blockquote {
      margin: 14px 0 18px;
      padding: 12px 14px;
      border-left: 3px solid rgba(216, 104, 86, 0.55);
      background: rgba(255, 242, 232, 0.62);
      border-radius: 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.55);
    }
    .privacy-markdown blockquote p { margin: 0; }
    .privacy-markdown hr {
      border: 0;
      height: 1px;
      background: rgba(234, 216, 198, 0.75);
      margin: 18px 0;
    }
    .privacy-markdown code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.94em;
      background: rgba(255, 242, 232, 0.72);
      border: 1px solid rgba(234, 216, 198, 0.7);
      padding: 0.12em 0.34em;
      border-radius: 8px;
      color: #2c1f19;
    }
    .privacy-markdown pre {
      margin: 14px 0 18px;
      padding: 14px 14px;
      border-radius: 16px;
      overflow: auto;
      background: rgba(255, 242, 232, 0.82);
      border: 1px solid rgba(234, 216, 198, 0.75);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
    }
    .privacy-markdown pre code {
      display: block;
      padding: 0;
      border: none;
      background: transparent;
      color: #2b2622;
      font-size: 13.5px;
      line-height: 1.55;
      white-space: pre;
    }
    body.legal-document .footer {
      display: none;
    }
  </style>
</head>
<body class="legal-document">
  <header class="topbar glass">
    <a class="logo logo-link" href="index.html#overview">
      <img class="logo-icon" src="screenshots/Orchestrana%20icon%201.png" alt="Orchestrana icon" />
      <span data-en="Orchestrana™" data-zh="Orchestrana™">Orchestrana™</span>
    </a>
    <nav class="nav-links">
      <a href="index.html#overview" data-en="Overview" data-zh="概览">Overview</a>
      <a href="index.html#features" data-en="Features" data-zh="功能">Features</a>
      <a href="index.html#screenshots" data-en="Focus Cycle" data-zh="专注循环">Focus Cycle</a>
      <a href="index.html#visual-compare" data-en="Comparison" data-zh="对比">Comparison</a>
      <a href="index.html#docs" data-en="Docs" data-zh="文档">Docs</a>
      <a href="index.html#download" data-en="Download" data-zh="下载">Download</a>
      <a href="https://github.com/T-1234567890/orchestrana-app" target="_blank" rel="noreferrer" data-en="GitHub" data-zh="GitHub">GitHub</a>
      <button id="lang-toggle" aria-label="Switch language" data-en="EN / 中文" data-zh="中文 / EN">EN / 中文</button>
    </nav>
  </header>

  <main>
    <section class="privacy-shell">
      <div class="privacy-header reveal">
        <p class="eyebrow" data-en="Legal" data-zh="法律">Legal</p>
        <h1 data-en="Privacy Policy" data-zh="隐私政策">Privacy Policy</h1>
        <p class="muted" data-en="This page displays the official privacy policy text (English)." data-zh="本页面展示官方隐私政策原文（英文）。">This page displays the official privacy policy text (English).</p>
        <div class="legal-nav">
          <a class="soft-btn primary-ish" href="policies.html" data-en="View All Policies" data-zh="查看全部政策">View All Policies</a>
        </div>
      </div>

      <article class="privacy-card glass fade-on-load" aria-label="Privacy policy content">
        <div id="privacy-content" class="privacy-markdown">
          <p class="muted" id="privacy-loading" data-en="Loading privacy policy…" data-zh="正在加载隐私政策…">Loading privacy policy…</p>
        </div>
      </article>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="script.js"></script>
  <script>
    (async () => {
      const contentEl = document.getElementById('privacy-content');
      if (!contentEl) return;

      const candidates = [
        'legal/privacy-policy/privacy-policy.md',
        'Screenshot/privacy_version_feb_27_2026.md',
        'screenshots/privacy_version_feb_27_2026.md'
      ];

      let markdownText = null;
      for (const url of candidates) {
        try {
          const res = await fetch(url, { cache: 'no-store' });
          if (!res.ok) continue;
          markdownText = await res.text();
          break;
        } catch (err) {}
      }

      if (!markdownText) {
        contentEl.innerHTML = '<p class="muted">Unable to load privacy policy.</p>';
        return;
      }

      try {
        marked.setOptions({
          gfm: true,
          breaks: false,
          headerIds: true,
          mangle: false
        });
        contentEl.innerHTML = marked.parse(markdownText);
      } catch (err) {
        contentEl.textContent = markdownText;
        return;
      }

      const firstHeading = contentEl.querySelector('h1');
      if (firstHeading) firstHeading.remove();

      contentEl.querySelectorAll('a[href]').forEach((a) => {
        const href = a.getAttribute('href') || '';
        if (/^https?:\/\//i.test(href)) {
          a.target = '_blank';
          a.rel = 'noreferrer';
        }
      });
    })();
  </script>
</body>
</html>
